<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>veri yakalama oyunu</title>
    <style>
        body { 
            background: #020617; color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif;
            touch-action: none; 
        }
        .hud { 
            display: flex; justify-content: space-around; width: 100%; 
            padding: 15px; background: #0f172a; border-bottom: 3px solid #38bdf8;
            font-weight: bold; font-size: 18px;
        }
        canvas { 
            background: #000000; border: 3px solid #1e293b; 
            margin-top: 10px; max-width: 95%; height: auto;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .controls { display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; margin-top: 20px; }
        .btn { 
            width: 65px; height: 65px; background: rgba(56, 189, 248, 0.1); 
            border: 2px solid #38bdf8; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; color: white; user-select: none;
        }
        .btn:active { background: #38bdf8; transform: scale(0.9); }
        @media (min-width: 800px) { .controls { display: none; } }
    </style>
</head>
<body>

    <div class="hud">
        <div style="color: #fbbf24;">SKOR: <span id="skor">0</span></div>
        <div style="color: #f8fafc;">SÜRE: <span id="sure">60</span></div>
    </div>

    <canvas id="oyunSahnesi" width="400" height="400"></canvas>

    <div class="controls">
        <div style="grid-column: 2;" class="btn" id="btnUp">▲</div>
        <div style="grid-column: 1;" class="btn" id="btnLeft">◀</div>
        <div style="grid-column: 2;" class="btn" id="btnDown">▼</div>
        <div style="grid-column: 3;" class="btn" id="btnRight">▶</div>
    </div>

    <script>
        const canvas = document.getElementById("oyunSahnesi");
        const ctx = canvas.getContext("2d");

        let skor = 0;
        let sure = 60;
        let oyunBitti = false;
        let zorluk = 1;

        const oyuncu = { x: 30, y: 30, boyut: 20, hiz: 4 };
        const hedef = { x: 200, y: 200, boyut: 16 };
        
        const duvarlar = [
            { x: 80, y: 80, w: 20, h: 240 },
            { x: 300, y: 80, w: 20, h: 240 },
            { x: 150, y: 150, w: 100, h: 20 }
        ];

        const botlar = [
            { x: 350, y: 350, boyut: 20, hx: 2, hy: 2 },
            { x: 50, y: 350, boyut: 20, hx: 1.5, hy: -2.5 }
        ];

        const tuslar = {};
        window.addEventListener("keydown", (e) => tuslar[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => tuslar[e.key.toLowerCase()] = false);

        function setupBtn(id, key) {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); tuslar[key] = true; };
            const end = (e) => { e.preventDefault(); tuslar[key] = false; };
            btn.addEventListener("touchstart", start);
            btn.addEventListener("touchend", end);
            btn.addEventListener("mousedown", start);
            btn.addEventListener("mouseup", end);
        }
        setupBtn("btnUp", "w"); setupBtn("btnDown", "s"); setupBtn("btnLeft", "a"); setupBtn("btnRight", "d");

        function carpisma(o1, o2) {
            const b1 = o1.boyut || 0;
            const b2 = o2.boyut || 0;
            const w2 = o2.w || b2;
            const h2 = o2.h || b2;
            return o1.x < o2.x + w2 && o1.x + (o1.boyut || o1.w) > o2.x &&
                   o1.y < o2.y + h2 && o1.y + (o1.boyut || o1.h) > o2.y;
        }

        function hedefiTasila() {
            let guvende = false;
            while (!guvende) {
                hedef.x = 20 + Math.random() * (canvas.width - 40);
                hedef.y = 20 + Math.random() * (canvas.height - 40);
                guvende = true;
                duvarlar.forEach(d => { if(carpisma(hedef, d)) guvende = false; });
            }
        }

        const sayac = setInterval(() => {
            if (sure > 0 && !oyunBitti) {
                sure--;
                document.getElementById("sure").innerText = sure;
            } else if (!oyunBitti) {
                bitir("Zaman doldu! Skorun: " + skor);
            }
        }, 1000);

        function bitir(msg) {
            oyunBitti = true;
            alert(msg);
            location.reload();
        }

        function guncelle() {
            if (oyunBitti) return;

            let nx = oyuncu.x;
            let ny = oyuncu.y;

            if (tuslar["w"] || tuslar["arrowup"]) ny -= oyuncu.hiz;
            if (tuslar["s"] || tuslar["arrowdown"]) ny += oyuncu.hiz;
            if (tuslar["a"] || tuslar["arrowleft"]) nx -= oyuncu.hiz;
            if (tuslar["d"] || tuslar["arrowright"]) nx += oyuncu.hiz;

            let carpti = false;
            duvarlar.forEach(d => {
                if (carpisma({x: nx, y: ny, boyut: oyuncu.boyut}, d)) carpti = true;
            });

            if (!carpti && nx >= 0 && nx <= canvas.width - oyuncu.boyut && ny >= 0 && ny <= canvas.height - oyuncu.boyut) {
                oyuncu.x = nx;
                oyuncu.y = ny;
            }

            botlar.forEach(b => {
                b.x += b.hx * zorluk;
                b.y += b.hy * zorluk;
                if (b.x <= 0 || b.x >= canvas.width - b.boyut) b.hx *= -1;
                if (b.y <= 0 || b.y >= canvas.height - b.boyut) b.hy *= -1;
                duvarlar.forEach(d => { if(carpisma(b, d)) { b.hx *= -1; b.hy *= -1; } });
                if (carpisma(oyuncu, b)) bitir("YAKALANDIN!");
            });

            if (carpisma(oyuncu, hedef)) {
                skor += 10;
                zorluk += 0.07;
                document.getElementById("skor").innerText = skor;
                hedefiTasila();
            }
        }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Izgara
            ctx.strokeStyle = "#111827";
            for(let i=0; i<400; i+=40) { ctx.strokeRect(i, 0, 40, 400); ctx.strokeRect(0, i, 400, 40); }

            // Duvarlar
            ctx.fillStyle = "#334155";
            duvarlar.forEach(d => ctx.fillRect(d.x, d.y, d.w, d.h));

            // Hedef
            ctx.fillStyle = "#fbbf24";
            ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
            ctx.beginPath(); ctx.arc(hedef.x + 8, hedef.y + 8, 8, 0, Math.PI*2); ctx.fill();

            // Botlar
            ctx.fillStyle = "#ef4444"; ctx.shadowColor = "red";
            botlar.forEach(b => ctx.fillRect(b.x, b.y, b.boyut, b.boyut));

            // Oyuncu
            ctx.fillStyle = "#38bdf8"; ctx.shadowColor = "#38bdf8";
            ctx.fillRect(oyuncu.x, oyuncu.y, oyuncu.boyut, oyuncu.boyut);
            ctx.shadowBlur = 0;
        }

        function dongu() { guncelle(); ciz(); requestAnimationFrame(dongu); }
        hedefiTasila();
        dongu();
    </script>
</body>
</html>
